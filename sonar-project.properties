# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud — Backend Laravel SkillHub
# Organisation : nirina2108  (même org que le projet Spring Boot)
# À créer dans SonarCloud : https://sonarcloud.io/projects/create
# ──────────────────────────────────────────────────────────────────────────────

sonar.organization=nirina2108
sonar.projectKey=nirina2108_skillhub-laravel
sonar.projectName=SkillHub — Backend Laravel
sonar.projectVersion=1.0

# ── Sources & Tests ────────────────────────────────────────────────────────────
sonar.sources=app
sonar.tests=tests

# ── Couverture PHP (rapport Clover généré par PHPUnit) ────────────────────────
sonar.php.coverage.reportPaths=coverage.xml

# ── Exclusions ────────────────────────────────────────────────────────────────
# Vendor, cache, storage non analysés
sonar.exclusions=\
  **/vendor/**,\
  **/bootstrap/cache/**,\
  **/storage/**,\
  **/public/**,\
  **/resources/views/**

# ActivityLog étend MongoModel — difficile à couvrir en tests SQLite
sonar.coverage.exclusions=\
  app/Models/ActivityLog.php,\
  app/Services/ActivityLogService.php

# ── Encoding ──────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

name: CI — skillhub-back

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:

  test:
    name: Tests PHPUnit (SQLite memoire)
    runs-on: ubuntu-latest

    steps:

      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, pdo_sqlite, mbstring, zip, mongodb-2.2.0
          coverage: pcov

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Installer les dependances Composer
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Preparer l environnement Laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Executer les tests PHPUnit avec coverage
        run: ./vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Analyse SonarCloud
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=poun-2108
            -Dsonar.projectKey=poun-2108_skillhub-back
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.php.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/vendor/**,**/bootstrap/cache/**,**/storage/**,**/public/**,**/resources/views/**
            -Dsonar.coverage.exclusions=app/Models/ActivityLog.php,app/Services/ActivityLogService.php
            -Dsonar.qualitygate.wait=false

  docker:
    name: Build et Push Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Definir le tag Docker
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build et Push image skillhub-back
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/skillhub-back:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/skillhub-back:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resume
        run: |
          echo "Image publiee :"
          echo "  ${{ secrets.DOCKER_USERNAME }}/skillhub-back:${{ steps.tag.outputs.tag }}"
          echo "  ${{ secrets.DOCKER_USERNAME }}/skillhub-back:${{ github.sha }}"
